    <!-- Viewport y tema -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- SEO básico -->
    <title>CityMap — La guía de tu ciudad</title>
    <meta name="description" content="Explora negocios locales, lugares de interés y eventos exclusivos. Encuentra lo mejor de tu ciudad en un solo lugar." />
    <meta name="keywords" content="CityMap, guia turistica, eventos, restaurantes, que hacer, negocios, directorio local" />
    <meta name="author" content="CityMap.mx" />
    <link rel="canonical" href="https://citymap.mx" />
    <script>
      // Dynamic canonical: update on every navigation so Google sees the correct URL per page
      function updateCanonical() {
        var path = window.location.pathname.replace(/\/$/, '') || '/';
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.href = 'https://citymap.mx' + path;
      }
      updateCanonical();
      // Listen to SPA route changes
      var _pushState = history.pushState;
      history.pushState = function() { _pushState.apply(history, arguments); updateCanonical(); };
      window.addEventListener('popstate', updateCanonical);
    </script>

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://citymap.mx" />
    <meta property="og:title" content="CityMap — La guía de tu ciudad" />
